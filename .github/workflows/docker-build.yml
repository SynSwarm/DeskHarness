name: Docker build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: deskharness:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test health endpoint
        run: |
          docker run -d --name deskharness-ci -p 18080:8080 deskharness:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/openharness/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs deskharness-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f deskharness-ci || true
