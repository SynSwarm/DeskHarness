# Pull-only compose (no local build) — requires a published GHCR tag

services:
  engine:
    image: ghcr.io/synswarm/deskharness:${DESKHARNESS_TAG:-latest}
    ports:
      - "8080:8080"
    volumes:
      - deskharness-sessions:/app/memory/sessions
      - deskharness-logs:/app/memory/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/openharness/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  deskharness-sessions:
  deskharness-logs:
