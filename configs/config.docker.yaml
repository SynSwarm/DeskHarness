# Docker / production defaults (baked into official image)

engine:
  dev_mode: false
  listen:
    host: "0.0.0.0"
    port: 8080
  openharness:
    path_prefix: "/openharness"
    invoke_mode: turn
    supported_protocol_versions:
      - "1.0.0"
  plugin_dirs:
    - ./plugins
  session:
    backend: embedded_sqlite
    store_path: ./memory/sessions/deskharness.db
    ttl_hours: 168
    max_turns: 20
    keep_recent: 10
  context:
    max_turns: 20
    keep_recent: 10
  rate_limit:
    enabled: false
    requests_per_minute: 60
  callback_public_base: "http://127.0.0.1:8080"

brain:
  adapter: mock
  endpoint: "http://127.0.0.1:8090/brain"
  timeout_ms: 30000

routing:
  mode: brain_led
  export_intents_to_brain: true
  routes_file: ./configs/routes.yaml
  allowed_plugins:
    - order-lookup
    - noop
    - echo

logging:
  level: info
  path: ./memory/logs
