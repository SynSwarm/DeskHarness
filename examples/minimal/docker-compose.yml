services:
  engine:
    build:
      context: ../..
      dockerfile: examples/minimal/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ../../memory/sessions:/app/memory/sessions
      - ../../memory/logs:/app/memory/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/openharness/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  mock-brain:
    profiles: ["http-brain"]
    build:
      context: ../..
      dockerfile: examples/minimal/Dockerfile
    command: ["python", "examples/minimal/mock_brain_server.py"]
    ports:
      - "8090:8090"
